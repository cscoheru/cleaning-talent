# Spring Boot 配置文件
# 环境: Demo 开发环境
# 数据库: PostgreSQL on Node A
# ⚠️ 安全提醒: 生产环境请使用环境变量覆盖配置

spring:
  application:
    name: cleaning-talent-backend

  # 数据源配置 (支持环境变量覆盖)
  datasource:
    url: ${DATABASE_URL:jdbc:postgresql://139.224.42.111:5432/cleaning_talent_demo}
    username: ${DATABASE_USER:postgres}
    password: ${DATABASE_PASSWORD:WhjQTPAwInc5Vav3sDWe}
    driver-class-name: org.postgresql.Driver

    # HikariCP 连接池配置
    hikari:
      maximum-pool-size: 10
      minimum-idle: 5
      connection-timeout: 30000
      idle-timeout: 600000
      max-lifetime: 1800000

  # JPA 配置
  jpa:
    hibernate:
      ddl-auto: validate  # 验证表结构，不自动修改
    show-sql: true        # 开发环境显示 SQL
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
        use_sql_comments: true

  # Redis 配置 (支持环境变量覆盖)
  data:
    redis:
      host: ${REDIS_HOST:139.224.42.111}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:FWD4D75OKyQS7HOluA6J}
      timeout: 60000
      lettuce:
        pool:
          max-active: 8
          max-idle: 8
          min-idle: 2

# MyBatis-Plus 配置
mybatis-plus:
  configuration:
    map-underscore-to-camel-case: true  # 驼峰命名转换
    log-impl: org.apache.ibatis.logging.slf4j.Slf4jImpl
  global-config:
    db-config:
      id-type: auto          # 主键自增
      logic-delete-field: deleted
      logic-delete-value: 1
      logic-not-delete-value: 0
  mapper-locations: classpath:mapper/**/*.xml

# 服务器配置
server:
  port: 8080
  servlet:
    context-path: /

# 日志配置
logging:
  level:
    root: INFO
    com.lms: DEBUG
    org.springframework.web: DEBUG
    org.hibernate.SQL: DEBUG
    org.hibernate.type.descriptor.sql.BasicBinder: TRACE

# JWT 配置 - 支持环境变量覆盖
jwt:
  secret: ${JWT_SECRET:cleaning-talent-demo-secret-key-change-in-production}
  expiration: ${JWT_EXPIRATION:86400000}  # 24 小时 (毫秒)

# 文件上传配置 (MinIO) - 支持环境变量覆盖
minio:
  endpoint: ${MINIO_ENDPOINT:http://139.224.42.111:9000}
  access-key: ${MINIO_ACCESS_KEY:admin}
  secret-key: ${MINIO_SECRET_KEY:xhOSMeHNmxCgNTBpoQfH}
  bucket: ${MINIO_BUCKET:cleaning-talent-demo}

# CORS 配置
cors:
  allowed-origins:
    - http://localhost:5173
    - https://lms-demo.vercel.app
  allowed-methods:
    - GET
    - POST
    - PUT
    - DELETE
    - OPTIONS
  allowed-headers: "*"
  allow-credentials: true
  max-age: 3600

---
# 生产环境配置 (可选)
spring:
  config:
    activate:
      on-profile: prod

  datasource:
    url: ${DATABASE_URL}
    username: ${DATABASE_USERNAME}
    password: ${DATABASE_PASSWORD}

logging:
  level:
    root: WARN
    com.lms: INFO
