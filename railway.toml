# Railway Configuration
# 用途：配置后端 Spring Boot 应用在 Railway 平台的部署

[build]
# 使用 Dockerfile 构建方式
builder = "DOCKERFILE"
dockerfilePath = "backend/Dockerfile"

# [build] 使用 Gradle 构建方式（备选方案，如不使用 Dockerfile）
# buildCommand = "./gradlew clean build -x test --no-daemon"
# watchPatterns = ["backend/src/**", "backend/build.gradle*"]

[deploy]
# 健康检查路径
healthcheckPath = "/actuator/health"
healthcheckTimeout = 300
# 启动超时时间（秒）
startTimeout = 600

# 重启策略：仅在失败时重启
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 10

# 环境变量（可在 Railway 控制台覆盖）
[deploy.env]
# JVM 参数
JAVA_OPTS = "-XX:+UseContainerSupport -XX:MaxRAMPercentage=75.0 -XX:+UseG1GC"
# Spring Profile
SPRING_PROFILES_ACTIVE = "production"

# 服务暴露配置（Railway 会自动分配公网 URL）
# [[services.ports]]
# port = 8080
# handlers = ["http"]
