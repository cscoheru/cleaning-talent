# Railway Configuration - Spring Boot Backend
# 使用 Gradle 直接构建，避免 Dockerfile 上下文问题

[build]
# 使用 Gradle 构建器
builder = "NIXPACKS"

# 设置构建上下文为 backend 目录
context = "backend"

# 构建命令
buildCommand = "./gradlew clean build -x test --no-daemon"

# 监听模式文件模式
watchPatterns = ["src/**", "build.gradle*"]

[deploy]
# 健康检查路径
healthcheckPath = "/api/v1/health"
healthcheckTimeout = 300
# 启动超时时间（秒）
startTimeout = 600

# 重启策略：仅在失败时重启
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 10

# 环境变量
[deploy.env]
# JVM 参数
JAVA_OPTS = "-XX:+UseContainerSupport -XX:MaxRAMPercentage=75.0 -XX:+UseG1GC"
# Spring Profile
SPRING_PROFILES_ACTIVE = "production"

# 启动命令
[startCommand]
command = "java -jar build/libs/*.jar"
